apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
spec:
  values:
    fullnameOverride: ingress-nginx
    controller:
      replicaCount: 2
      service:
        type: LoadBalancer
        annotations:                                                                                                                                                                         
          service.beta.kubernetes.io/aws-load-balancer-type: external                 # was "nlb"
          service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: instance     # add (or "ip" for VPC-CNI pod IPs)                                                                       
          service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing                                                                                                                 
          service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"      
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
