apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 20h0m0s
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 82.16.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  targetNamespace: monitoring
  values:
    fullnameOverride: kube-prometheus-stack
    prometheus:
      enabled: true
      prometheusSpec:
        retention: 15d
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 50Gi
    grafana:
      enabled: true
      adminPassword: admin
      persistence:
        enabled: true
        size: 10Gi
    alertmanager:
      enabled: true
    kubeStateMetrics:
      enabled: true
    nodeExporter:
      enabled: true
    defaultRules:
      create: true