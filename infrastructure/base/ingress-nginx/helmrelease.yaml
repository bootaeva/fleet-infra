apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 1h0m0s
  timeout: 15m
  chart:
    spec:
      chart: ingress-nginx
      version: 4.11.*
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      reconcileStrategy: ChartVersion
  targetNamespace: ingress-nginx
  install:
    createNamespace: true
    timeout: 15m
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    timeout: 15m
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    controller:
      ingressClassResource:
        name: nginx
        default: true
      service:
        enabled: true
        type: LoadBalancer
