apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: flux-system
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: external-dns
      version: 1.15.*
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  install:
    createNamespace: true
  targetNamespace: external-dns
  values:
    provider: aws
    sources:
      - service
      - ingress
    policy: sync
    registry: txt
